name: snitch-env
version: 0.1.0
description: Scalable oversight environment for multi-agent auditing.

entrypoint: server:app
host: 0.0.0.0
port: 8000

env:
  module: env.snitch_env
  class: SnitchEnv

observation_space:
  type: dict
  fields:
    question: str
    trace: list
    claimed_answer: str

action_space:
  type: discrete
  values: [benign, misbehavior]

episode:
  max_steps: 1
  reward_range: [-1.0, 1.0]

data:
  questions: data/questions.json
  train_traces: data/train_traces.jsonl
  eval_traces: data/eval_traces.jsonl

policies:
  held_out_variant: 3
